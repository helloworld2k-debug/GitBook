<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>You have been invited</title>
</head>
<body style="margin:0;padding:0;background-color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#0f172a;min-height:100vh;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" width="560" cellspacing="0" cellpadding="0" style="max-width:560px;width:100%;">
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <h1 style="margin:0;color:#e2e8f0;font-size:24px;font-weight:600;">You're Invited</h1>
            </td>
          </tr>
          <tr>
            <td style="background-color:#1e293b;border-radius:12px;padding:32px;">
              <p style="margin:0 0 20px;color:#94a3b8;font-size:16px;line-height:24px;">You have been invited to join Gitbook AI. Click the button below to accept the invitation and set up your account.</p>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                <tr>
                  <td align="center" style="padding:8px 0;">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;background-color:#06b6d4;color:#ffffff;text-decoration:none;font-size:16px;font-weight:600;padding:12px 32px;border-radius:8px;">Accept Invitation</a>
                  </td>
                </tr>
              </table>
              <p style="margin:20px 0 0;color:#64748b;font-size:14px;line-height:20px;">If you did not expect this invitation, you can safely ignore this email.</p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;color:#475569;font-size:12px;">Gitbook AI &mdash; Software Donation Platform</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
